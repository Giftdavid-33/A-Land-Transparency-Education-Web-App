<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LandGuard NG — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0a1f14; --forest:#0d3322; --emerald:#145c38; --jade:#1a7a4a;
  --gold:#c9a84c; --gold-lt:#f0d98a; --cream:#fafaf5; --white:#fff; --muted:#6b7280; --error:#ef4444;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 60% at 80% 20%,rgba(26,122,74,.2) 0%,transparent 55%),radial-gradient(ellipse 50% 50% at 10% 90%,rgba(201,168,76,.1) 0%,transparent 50%)}
.card{background:var(--white);border-radius:20px;width:100%;max-width:460px;padding:48px 44px;box-shadow:0 30px 80px rgba(0,0,0,.5);position:relative;z-index:1}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;justify-content:center;margin-bottom:32px}
.logo-icon{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--jade));display:flex;align-items:center;justify-content:center;font-size:22px}
.logo-text{font-family:'Playfair Display',Georgia,serif;font-size:22px;font-weight:700;color:var(--ink)}
.logo-text span{color:var(--jade)}
.tabs{display:flex;background:var(--cream);border-radius:10px;padding:4px;margin-bottom:28px}
.tab{flex:1;padding:10px;border:none;border-radius:8px;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--muted);transition:all .2s}
.tab.active{background:var(--white);color:var(--ink);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.form-panel{display:none}
.form-panel.active{display:block}
.form-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--ink);margin-bottom:6px}
.form-sub{font-size:14px;color:var(--muted);margin-bottom:24px;font-weight:300}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px}
.field input{width:100%;padding:13px 16px;background:var(--cream);border:1.5px solid #e5e7eb;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--ink);transition:border-color .2s;outline:none}
.field input:focus{border-color:var(--jade);background:var(--white);box-shadow:0 0 0 3px rgba(26,122,74,.1)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:46px}
.toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted);padding:0;line-height:1}
.submit-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--emerald),var(--jade));color:var(--white);border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:all .22s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(20,92,56,.4)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.alert{padding:12px 16px;border-radius:8px;font-size:14px;font-weight:500;margin-bottom:16px;display:none}
.alert.show{display:block}
.alert.error{background:#fef2f2;color:var(--error);border:1px solid #fecaca}
.alert.success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.footer-note{text-align:center;font-size:13px;color:var(--muted);margin-top:20px}
.footer-note strong{color:var(--jade);cursor:pointer}
.footer-note strong:hover{text-decoration:underline}
.strength-bar{height:4px;border-radius:99px;background:#e5e7eb;margin-top:6px;overflow:hidden}
.strength-fill{height:100%;border-radius:99px;transition:width .3s,background .3s;width:0}
.strength-label{font-size:11px;margin-top:4px;font-weight:500}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.spinner.show{display:block}
</style>
</head>
<body>
<div class="card">
  <a href="#" class="logo">
    <div class="logo-icon">🛡</div>
    <span class="logo-text">Land<span>Guard</span> NG</span>
  </a>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Sign In</button>
    <button class="tab"        onclick="switchTab('register')">Create Account</button>
  </div>
  <div class="alert" id="alert"></div>

  <!-- LOGIN -->
  <div class="form-panel active" id="panel-login">
    <h2 class="form-title">Welcome back</h2>
    <p class="form-sub">Sign in to access LandGuard NG</p>
    <form id="login-form">
      <div class="field">
        <label>Username</label>
        <input type="text" id="l-user" placeholder="Your username" required>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="l-pass" placeholder="Your password" required>
          <button type="button" class="toggle-pw" onclick="togglePw('l-pass',this)">👁</button>
        </div>
      </div>
      <button type="submit" class="submit-btn" id="login-btn">
        <span>Sign In</span><div class="spinner" id="l-spin"></div>
      </button>
    </form>
    <div class="footer-note">No account? <strong onclick="switchTab('register')">Create one free →</strong></div>
  </div>

  <!-- REGISTER -->
  <div class="form-panel" id="panel-register">
    <h2 class="form-title">Create your account</h2>
    <p class="form-sub">Join LandGuard NG — it's free</p>
    <form id="register-form">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="r-name" placeholder="e.g. Chidi Okafor">
      </div>
      <div class="field">
        <label>Username *</label>
        <input type="text" id="r-user" placeholder="Choose a username" required>
      </div>
      <div class="field">
        <label>Phone Number *</label>
        <input type="tel" id="r-phone" placeholder="+234 800 000 0000" required>
      </div>
      <div class="field">
        <label>Password *</label>
        <div class="pw-wrap">
          <input type="password" id="r-pass" placeholder="Min. 6 characters" required oninput="checkStrength(this.value)">
          <button type="button" class="toggle-pw" onclick="togglePw('r-pass',this)">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="s-fill"></div></div>
        <div class="strength-label" id="s-label"></div>
      </div>
      <div class="field">
        <label>Confirm Password *</label>
        <div class="pw-wrap">
          <input type="password" id="r-confirm" placeholder="Repeat your password" required>
          <button type="button" class="toggle-pw" onclick="togglePw('r-confirm',this)">👁</button>
        </div>
      </div>
      <button type="submit" class="submit-btn" id="register-btn">
        <span>Create Account</span><div class="spinner" id="r-spin"></div>
      </button>
    </form>
    <div class="footer-note">Have an account? <strong onclick="switchTab('login')">Sign in →</strong></div>
  </div>
</div>

<script>
function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(i===0)===(t==='login')));
  document.getElementById('panel-login').classList.toggle('active',t==='login');
  document.getElementById('panel-register').classList.toggle('active',t==='register');
  hideAlert();
}
function showAlert(msg,type='error'){const e=document.getElementById('alert');e.textContent=msg;e.className='alert '+type+' show';e.scrollIntoView({behavior:'smooth',block:'nearest'});}
function hideAlert(){document.getElementById('alert').className='alert';}
function togglePw(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.textContent=i.type==='text'?'🙈':'👁';}
function checkStrength(v){
  const fill=document.getElementById('s-fill'),label=document.getElementById('s-label');
  let s=0;if(v.length>=6)s++;if(v.length>=10)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;
  const lvl=[{p:'0%',c:'',t:''},{p:'25%',c:'#ef4444',t:'🔴 Weak'},{p:'50%',c:'#f97316',t:'🟠 Fair'},{p:'75%',c:'#eab308',t:'🟡 Good'},{p:'100%',c:'#22c55e',t:'🟢 Strong'}][Math.min(s,4)];
  fill.style.width=lvl.p;fill.style.background=lvl.c;label.textContent=lvl.t;label.style.color=lvl.c;
}
function setLoading(btnId,spinId,on){document.getElementById(btnId).disabled=on;document.getElementById(spinId).classList.toggle('show',on);}

document.getElementById('login-form').addEventListener('submit',async e=>{
  e.preventDefault();hideAlert();setLoading('login-btn','l-spin',true);
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('l-user').value.trim(),password:document.getElementById('l-pass').value})});
    const d=await r.json();
    if(r.ok){localStorage.setItem('lg_token',d.token);localStorage.setItem('lg_username',d.username);localStorage.setItem('lg_fullname',d.fullName||d.username);localStorage.setItem('lg_phone',d.phone||'');showAlert('✅ '+d.message,'success');setTimeout(()=>{window.location.href='/'},800);}
    else showAlert('⚠️ '+d.error);
  }catch{showAlert('⚠️ Network error. Is the server running?');}
  finally{setLoading('login-btn','l-spin',false);}
});

document.getElementById('register-form').addEventListener('submit',async e=>{
  e.preventDefault();hideAlert();
  const phone=document.getElementById('r-phone').value.trim();
  const pass=document.getElementById('r-pass').value;
  const confirm=document.getElementById('r-confirm').value;
  if(!phone)return showAlert('⚠️ Phone number is required.');
  if(pass!==confirm)return showAlert('⚠️ Passwords do not match.');
  if(pass.length<6)return showAlert('⚠️ Password must be at least 6 characters.');
  setLoading('register-btn','r-spin',true);
  try{
    const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('r-user').value.trim(),password:pass,fullName:document.getElementById('r-name').value.trim(),phone})});
    const d=await r.json();
    if(r.ok){localStorage.setItem('lg_token',d.token);localStorage.setItem('lg_username',d.username);localStorage.setItem('lg_fullname',d.fullName||d.username);localStorage.setItem('lg_phone',d.phone||'');showAlert('🎉 '+d.message,'success');setTimeout(()=>{window.location.href='/'},900);}
    else showAlert('⚠️ '+d.error);
  }catch{showAlert('⚠️ Network error. Is the server running?');}
  finally{setLoading('register-btn','r-spin',false);}
});

// Auto-redirect if already logged in
(async()=>{
  const t=localStorage.getItem('lg_token');
  if(t){try{const r=await fetch('/api/auth/me',{headers:{'Authorization':'Bearer '+t}});if(r.ok)window.location.href='/';}catch{}}
})();
</script>
</body>
</html>
